{% extends 'core/base.html' %}
{% load static %}

{% block title %}Reset Kata Sandi - {{ profile.nama_sekolah|default:"MIN 4 Jombang" }}{% endblock %}

{% block content %}
<style>
    .student-login-bg {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: -1;
    }
    .student-login-bg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .student-login-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(24, 64, 37, 0.75); /* Overlay hijau gelap transparan */
    }
</style>

<div class="student-login-bg">
    <img src="{% static 'img/selamat_datang.jpg' %}" alt="Background">
</div>

<section class="section" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1;">
    <div class="wrap" style="width: 100%; max-width: 450px;">
        <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="color: #0f172a; font-size: 1.5rem; margin-bottom: 8px;">Kata Sandi Baru</h2>
                <p style="color: #64748b; font-size: 0.95rem;">Buat kata sandi baru untuk akun Anda.</p>
            </div>
            
            {% if error %}
            <div style="background-color: #fee2e2; color: #ef4444; padding: 12px 16px; border-radius: 8px; margin-bottom: 24px; font-size: 0.9rem; text-align: center;">
                <i class="fas fa-exclamation-circle" style="margin-right: 6px;"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div style="margin-bottom: 20px;">
                    <label for="password_baru" style="display: block; margin-bottom: 8px; color: #334155; font-weight: 500; font-size: 0.95rem;">Kata Sandi Baru</label>
                    <input type="password" id="password_baru" name="password_baru" required placeholder="Masukkan kata sandi baru" minlength="4"
                        style="width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; transition: all 0.2s; font-family: inherit;">
                </div>
                
                <div style="margin-bottom: 24px;">
                    <label for="konfirmasi_password" style="display: block; margin-bottom: 8px; color: #334155; font-weight: 500; font-size: 0.95rem;">Konfirmasi Kata Sandi Baru</label>
                    <input type="password" id="konfirmasi_password" name="konfirmasi_password" required placeholder="Ketik ulang kata sandi baru" minlength="4"
                        style="width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; transition: all 0.2s; font-family: inherit;">
                </div>
                
                <button type="submit" class="btn btn--primary" style="width: 100%; display: block; text-align: center; font-size: 1rem; padding: 14px;">
                    <i class="fas fa-save" style="margin-right: 8px;"></i> Simpan Kata Sandi
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
