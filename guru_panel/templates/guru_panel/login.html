<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal Guru - MIN 4 Jombang</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/guru_style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body.login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #F4F7F6;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #114232;
            margin: 0 0 10px;
            font-weight: 700;
        }
        .login-header p {
            color: #666;
            margin: 0;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #1E88E5;
            outline: none;
            box-shadow: 0 0 0 3px rgba(30,136,229,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #114232;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #0d3326;
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            background-color: #ffebee;
            color: #c62828;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-header">
            <h2>Portal Guru MIN</h2>
            <p>Silakan login dengan NIP Anda</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="nip">NIP / Username</label>
                <input type="text" id="nip" name="nip" class="form-control" required placeholder="Masukkan NIP">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Masukkan password">
            </div>
            <button type="submit" class="btn-login">Login Masuk</button>
        </form>
    </div>
</body>
</html>
